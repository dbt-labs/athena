name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Unit and functional tests — no AWS credentials required.
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Unit & Functional Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Run tests (with race detector)
        working-directory: go
        run: go test -race -count=1 ./...

  # ──────────────────────────────────────────────────────────────────────────
  # CGo FFI shim — build the shared library and run shim-level tests.
  # Covers the fixes from the Copilot review (NULL-pointer guard, off-by-one
  # NUL terminator, driver.release, wrong function names in panic handlers).
  # ──────────────────────────────────────────────────────────────────────────
  shim:
    name: CGo FFI Shim Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Install C toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc

      - name: Build shared library and run shim tests
        working-directory: go/pkg
        run: make test

  # ──────────────────────────────────────────────────────────────────────────
  # Integration tests — require real AWS credentials and Athena resources.
  # Runs only on pushes to main, not on PRs, to keep credentials out of
  # fork-originated workflows.
  #
  # Required secrets:
  #   AWS_ACCESS_KEY_ID       — IAM key with Athena + S3 permissions
  #   AWS_SECRET_ACCESS_KEY   — corresponding secret
  #   AWS_REGION              — e.g. us-east-1
  #   ATHENA_OUTPUT_LOCATION  — e.g. s3://my-bucket/athena-results/
  # ──────────────────────────────────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run integration tests (with race detector)
        working-directory: go
        env:
          ADBC_ATHENA_TESTS: "1"
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          ATHENA_OUTPUT_LOCATION: ${{ secrets.ATHENA_OUTPUT_LOCATION }}
        run: go test -race -count=1 -run TestIntegration ./...
