# **what?**
# Builds the Athena ADBC shared library for all four supported platforms,
# packages each binary into the tarball format expected by redist-adbc-driver-gh.yml,
# and publishes a GitHub Release so dbt-labs/fs can redistribute it to the CDN.

# **why?**
# dbt-labs/fs consumes drivers via redist-adbc-driver-gh.yml, which downloads
# pre-built binaries from GitHub Releases.  This workflow is the upstream
# counterpart: it produces those releases.

# **when?**
# On a pushed `v*` tag (e.g. v0.1.0).  Use workflow_dispatch for dry-runs;
# the release-creation step is skipped unless the trigger is an actual tag.

name: "Release"
run-name: ${{ startsWith(github.ref, 'refs/tags/') && format('Release {0}', github.ref_name) || 'Release (dry-run)' }}

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  determine-version:
    name: "Determine Version"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.VERSION }}
      tag: ${{ steps.v.outputs.TAG }}
      is_release: ${{ steps.v.outputs.IS_RELEASE }}
    steps:
      - name: "Compute version from ref"
        id: v
        # Pattern follows adbc-drivers/clickhouse and dbt-labs/adbc-spark:
        # parse the tag from `github.ref` on a tag push; fall back to a
        # synthetic version on workflow_dispatch so we never reuse a branch
        # name (which may contain `/`) in the archive filename.
        run: |
          REF="${{ github.ref }}"
          if [[ "$REF" == refs/tags/v* ]]; then
            TAG="${REF#refs/tags/}"
            VERSION="${TAG#v}"
            IS_RELEASE=true
          else
            VERSION="0.0.0-dryrun.${{ github.run_id }}"
            TAG="v${VERSION}"
            IS_RELEASE=false
          fi
          echo "Tag:        ${TAG}"
          echo "Version:    ${VERSION}"
          echo "IsRelease:  ${IS_RELEASE}"
          {
            echo "TAG=${TAG}"
            echo "VERSION=${VERSION}"
            echo "IS_RELEASE=${IS_RELEASE}"
          } >> "$GITHUB_OUTPUT"

  build:
    name: "Build/${{ matrix.platform }}_${{ matrix.arch }}"
    needs: determine-version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: linux,   arch: amd64, runner: ubuntu-latest,    ext: so    }
          - { platform: linux,   arch: arm64, runner: ubuntu-24.04-arm, ext: so    }
          - { platform: macos,   arch: arm64, runner: macos-latest,     ext: dylib }
          - { platform: windows, arch: amd64, runner: windows-latest,   ext: dll   }

    env:
      CGO_ENABLED: "1"
      VERSION: ${{ needs.determine-version.outputs.version }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # actions/checkout@v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: "Install C toolchain (Linux)"
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc

      - name: "Add MinGW to PATH (Windows)"
        if: runner.os == 'Windows'
        run: echo "C:/msys64/mingw64/bin" >> "$GITHUB_PATH"

      - name: "Build shared library"
        working-directory: go/pkg
        run: |
          EXT="${{ matrix.ext }}"
          go build -buildvcs=true -tags driverlib,netgo \
            -o "libadbc_driver_athena.${EXT}" -buildmode=c-shared \
            ./athena
          rm -f libadbc_driver_athena.h

      - name: "Package"
        run: |
          PLATFORM="${{ matrix.platform }}_${{ matrix.arch }}"
          EXT="${{ matrix.ext }}"
          ARCHIVE="athena_${PLATFORM}_v${VERSION}.tar.gz"
          tar czf "$ARCHIVE" -C go/pkg "libadbc_driver_athena.${EXT}"
          echo "Packaged: ${ARCHIVE}"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # actions/upload-artifact@v4
        with:
          name: driver-${{ matrix.platform }}-${{ matrix.arch }}
          path: "*.tar.gz"

  release:
    name: "Publish GitHub Release"
    runs-on: ubuntu-latest
    needs: [determine-version, build]
    # Only create a real release on a tag push.  workflow_dispatch runs still
    # produce all artifacts (visible on the run page) but skip release upload.
    if: needs.determine-version.outputs.is_release == 'true'
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # actions/download-artifact@v4
        with:
          pattern: driver-*
          merge-multiple: true
          path: packages

      - name: "Create manifest.yaml"
        run: |
          cat > packages/manifest.yaml << 'EOF'
          drivers:
            - path: athena
              license: Apache-2.0
          EOF

      - name: "[DEBUG] List packages"
        run: ls -la packages/

      - name: "Create GitHub Release"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.determine-version.outputs.tag }}"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Release ${TAG}" \
            --generate-notes \
            packages/*.tar.gz \
            packages/manifest.yaml
